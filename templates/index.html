<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASCII 비디오 터미널</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.5.0/css/xterm.min.css" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>🎬 ASCII 비디오 터미널</h1>
      <p class="subtitle">영상을 업로드하면 웹 내부 터미널에서 아스키 애니메이션으로 재생됩니다.</p>

      <section class="panel">
        <label for="videoFile">영상 파일 선택</label>
        <input id="videoFile" type="file" accept="video/*" />
        <div class="actions">
          <button id="uploadBtn">업로드</button>
          <button id="playBtn" disabled>재생</button>
          <button id="stopBtn" disabled>중지</button>
        </div>
        <p id="status">상태: 대기 중</p>
      </section>

      <section class="terminal-wrap">
        <div id="terminal"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
